<!-- Example of how you implement a webcomponent in a website -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Hello World!</title>
</head>

<body>

<h1>Web Component - Boilerplate & Helloworld</h1>

Code Snippet:
<pre style="overflow: auto"><code>
    &lt;script type="module" src="./app.esm.js"&gt;&lt;/script&gt;
    &lt;script nomodule src="./app.js"&gt;&lt;/script&gt;

    &lt;noi-a22-emission-index&gt;&lt;/noi-a22-emission-index&gt;
  </code></pre>


Output:
<script type="module" src="./noi-a22-emission-index.esm.js"></script>
<script nomodule src="./noi-a22-emission-index.js"></script>

<!-- Set the attribute "title" and refer to it as property in JS -->
<div style="display: flex; justify-content: center">
  <noi-a22-emission-index id="acqua" class="outline"></noi-a22-emission-index>
</div>

<div>
  <div class="btn-group">
    <div class="btn-group__name">Size</div>
    <button onclick="acqua.style.width = '500px'">mobile</button>
    <button onclick="acqua.style.width = '890px'">tablet</button>
    <button onclick="acqua.style.width = '100%'">full</button>
    <button onclick="acqua.style.width = '968px'; acqua.style.height = '800px'">preview</button>
  </div>

  <div class="btn-group">
    <div class="btn-group__name">layout</div>
    <button onclick="acqua.layout = 'mobile'"> mobile</button>
    <button onclick="acqua.layout = 'tablet'"> tablet</button>
    <button onclick="acqua.layout = 'desktop'"> desktop</button>
    <button onclick="acqua.layout = 'auto'"> auto</button>
  </div>

  <div class="btn-group">
    <div class="btn-group__name">language</div>
    <button onclick="acqua.language = 'en'">lang: en</button>
    <button onclick="acqua.language = 'it'">lang: it</button>
    <button onclick="acqua.language = 'xx'">lang: xx (missing)</button>
    <button onclick="acqua.language = null">lang: auto</button>
  </div>
  <div class="btn-group">
    <div class="btn-group__name">styles</div>
    <button onclick="acqua.classList.remove('dark')">default</button>
    <button onclick="acqua.classList.add('dark')">dark mode</button>
    <button onclick="acqua.classList.toggle('outline')">outline</button>
  </div>

  <script>
    function changeFontSize(change) {
      const currentSize = parseInt(acqua.style.fontSize || '16px', 10);
      acqua.style.fontSize = (currentSize + change) + 'px';
    }
  </script>
  <div class="btn-group">
    <div class="btn-group__name">actions</div>
    <button onclick="changeFontSize(-1)">font -</button>
    <button onclick="changeFontSize(1)">font +</button>
  </div>

  <div class="btn-group">
    <div class="btn-group__name">actions</div>
    <button onclick="acqua.refreshData()">refreshData</button>
  </div>

</div>

<!-- Roboto font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">

<style>
  noi-a22-emission-index {
    font-family: "Roboto", serif;
    height: 600px;
  }
  noi-a22-emission-index.outline {
    outline: 1px solid red;
  }

  noi-a22-emission-index.dark {
    font-family: cursive;
    outline: 1px solid red;

    --color-primary: rgb(224, 224, 224);
    --color-secondary: rgb(224, 224, 224);
    --color-text: #EEE;
    --color-background: #333;

    --map-line-color: #5d8d58;

    --map-filter: grayscale(100%) invert(1);

    --scrollbar-color: #CCC;
    --scrollbar-bg: #333;

    --color-air-good: #36a39c;
    --color-air-good-contrast: #EEE;

    --color-air-fair: #327f6a;
    --color-air-fair-contrast: #EEE;

    --color-air-moderate: #a39c2c;
    --color-air-moderate-contrast: #EEE;

    --color-air-poor: #b237;
    --color-air-poor-contrast: #EEE;

    --color-air-very-poor: #490018;
    --color-air-very-poor-contrast: #EEE;

    --color-air-extremely-poor: #320d34;
    --color-air-extremely-poor-contrast: #EEE;
  }

  noi-a22-emission-index.dark::part(marker) {
    background: #333;

    border: 1px solid currentColor;
    border-radius: 50%;
  }

  noi-a22-emission-index.dark::part(marker-icon) {
    color: currentColor;
  }
</style>


<style>
  .btn-group {
    display: inline-flex;
    align-items: center;
    gap: 0.5ch;
    position: relative;

    padding: 4px;
    padding-bottom: 3ch;
    margin: 2px;
    border: 1px solid gray;
    border-radius: 4px;
  }

  .btn-group .btn-group__name {
    padding: 4px;
    padding-right: 1ch;

    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    text-transform: lowercase;
  }
</style>
</body>

</html>
